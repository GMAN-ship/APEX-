name: Build Android APK

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-levels: '34'
          build-tools-version: '34.0.0'
          ndk-version: '26.1.10909125'

      - name: Install webapp dependencies
        working-directory: webapp
        run: npm install

      - name: Build web assets
        working-directory: webapp
        run: npm run build

      - name: Install Capacitor and create Android project
        working-directory: webapp
        run: |
          npm install @capacitor/core @capacitor/cli --save
          npx cap init "APEX EA" com.apex.ea --web-dir=dist
          npx cap add android

      - name: Copy web assets to Android project
        working-directory: webapp
        run: npx cap copy android

      - name: Build APK
        working-directory: webapp/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: apk
          path: webapp/android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: webapp/android/app/build/outputs/apk/debug/app-debug.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
